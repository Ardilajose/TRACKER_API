<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos Personales - COP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>💰 Control de Gastos Personales</h1>
                    <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">
                        🌙 Modo Oscuro
                    </button>
                </div>
                <div class="subtitle">
                    <p>moneda: pesos colombianos (cop)</p>
                </div>
            </div>
        </header>

        <div class="summary-cards">
            <div class="card income-card">
                <h3>💰 total ingresos</h3>
                <p class="amount" id="totalIngresos">$0</p>
            </div>
            <div class="card expense-card">
                <h3>💸 total gastos</h3>
                <p class="amount" id="totalGastos">$0</p>
            </div>
            <div class="card balance-card">
                <h3>⚖️ balance</h3>
                <p class="amount" id="balance">$0</p>
            </div>
        </div>

        <div class="categories-section">
            <h2>📊 gastos por categoria</h2>
            <div class="categories-grid" id="categoriesGrid">
                <div class="category-item">
                    <span>comida:</span>
                    <strong id="catComida">$0</strong>
                </div>
                <div class="category-item">
                    <span>transporte:</span>
                    <strong id="catTransporte">$0</strong>
                </div>
                <div class="category-item">
                    <span>ocio:</span>
                    <strong id="catOcio">$0</strong>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>📝 registrar transaccion</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label for="descripcion">descripcion:</label>
                    <input type="text" id="descripcion" required placeholder="ej: compra de supermercado">
                </div>

                <div class="form-group">
                    <label for="monto">monto (cop):</label>
                    <input type="number" id="monto" required step="1" placeholder="0">
                </div>

                <div class="form-group">
                    <label for="categoria">categoria:</label>
                    <select id="categoria" required>
                        <option value="">seleccionar</option>
                        <option value="comida">🍔 comida</option>
                        <option value="transporte">🚗 transporte</option>
                        <option value="ocio">🎮 ocio</option>
                        <option value="ingreso">💵 ingreso</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tipo">tipo:</label>
                    <select id="tipo" required>
                        <option value="">seleccionar</option>
                        <option value="ingreso">ingreso</option>
                        <option value="gasto">gasto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha">fecha:</label>
                    <input type="date" id="fecha" required>
                </div>

                <button type="submit" class="btn-submit">registrar transaccion</button>
            </form>
        </div>

        <div class="transactions-section">
            <h2>📋 historial de transacciones</h2>
            <div class="transactions-list" id="transactionsList">
                <div class="loading">cargando transacciones...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
